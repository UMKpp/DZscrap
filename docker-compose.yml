version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: isp_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: isp_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/storage/db.sqlite3
      - STORAGE_DIR=/app/storage
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: isp_worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/storage/db.sqlite3
      - STORAGE_DIR=/app/storage
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - redis
      - backend
    restart: unless-stopped

volumes:
  redis_data:
