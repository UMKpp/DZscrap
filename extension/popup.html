<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Scraper Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header>
      <h1 class="app-title">DZscraper</h1>
      <button id="btn-settings" class="settings-btn" title="Configure API Server">
        <img src="icons/settings.png" alt="Settings" id="img-settings">
      </button>
    </header>

    <!-- Settings Pane (Collapsible) -->
    <div id="settings-pane" class="settings-pane hidden">
      <h3>API Settings</h3>
      <div class="input-group">
        <label for="input-api-url">FastAPI Server URL</label>
        <input type="text" id="input-api-url" value="http://localhost:8000" placeholder="http://localhost:8000">
      </div>
      <button id="btn-save-settings" class="btn btn-save">Save Configuration</button>
    </div>

    <!-- Main Content -->
    <main>
      <!-- Form Section -->
      <section id="scraping-form-card" class="scraping-form-card">
        <h2>Start Scraping</h2>
        
        <div class="input-group">
          <label for="input-query">What images are you looking for?</label>
          <input type="text" id="input-query" placeholder="e.g., tomato leaf blight" required>
        </div>

        <div class="form-row">
          <div class="input-group half">
            <label for="select-engine">Source</label>
            <select id="select-engine">
              <option value="bing" selected>Default</option>
              <option value="bing">Bing Images</option>
            </select>
          </div>

          <div class="input-group half">
            <label for="input-limit">Limit</label>
            <input type="number" id="input-limit" min="10" max="2000" placeholder="max:2000">
          </div>
        </div>

        <button id="btn-start-scrape" class="btn btn-start btn-scrape">
          <span class="btn-text">SCRAPE NOW</span>
        </button>
      </section>

      <!-- Active & Historical Jobs Section -->
      <section id="jobs-section" class="jobs-section">
        <div class="section-header">
          <h2>My Datasets</h2>
          <button id="btn-refresh-jobs" class="refresh-btn" title="Refresh datasets">
            <img src="icons/refresh.png" alt="Refresh">
          </button>
        </div>

        <div id="jobs-list" class="jobs-list">
          <div class="empty-state">
            No active jobs found. Start a new scrape above!
          </div>
        </div>
      </section>
    </main>

    <!-- Status Bar -->
    <footer>
      <div class="status-indicator">
        <span id="connection-dot" class="dot offline"></span>
        <span id="connection-text">Connecting to Backend...</span>
      </div>
      <span class="version">v 1.0.1</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
